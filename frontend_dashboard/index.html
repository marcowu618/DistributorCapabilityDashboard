<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>渠道能力评估模型看板</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <h1>渠道能力评估模型看板</h1>
      <div class="filters">
        <label>区域
          <select id="areaSelect"></select>
        </label>
        <label>分公司
          <select id="branchSelect"></select>
        </label>
        <label>专员
          <select id="personSelect"></select>
        </label>
      </div>
    </header>

    <section class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">评分合计</div>
        <div class="kpi-value" id="totalScore">-</div>
      </div>
      <div class="kpi-card"><div class="kpi-label">专业技术能力</div><div class="kpi-value" id="kpiTech">-</div></div>
      <div class="kpi-card"><div class="kpi-label">工作态度与责任心</div><div class="kpi-value" id="kpiAttitude">-</div></div>
      <div class="kpi-card"><div class="kpi-label">学习成长能力</div><div class="kpi-value" id="kpiLearning">-</div></div>
      <div class="kpi-card"><div class="kpi-label">沟通协助能力</div><div class="kpi-value" id="kpiComm">-</div></div>
      <div class="kpi-card"><div class="kpi-label">执行力与结果产出</div><div class="kpi-value" id="kpiExec">-</div></div>
    </section>

    <section class="grid2">
      <div class="panel">
        <h2>个人能力画像</h2>
        <div id="radarChart" class="chart"></div>
      </div>
      <div class="panel">
        <h2>专业技术能力细分维度拆解</h2>
        <div id="techBarChart" class="chart"></div>
      </div>
    </section>

    <section class="grid2">
      <div class="panel">
        <h2>能力评级分布</h2>
        <div id="levelPieChart" class="chart"></div>
      </div>
      <div class="panel">
        <h2>渠道平均分对标</h2>
        <div id="channelBarChart" class="chart"></div>
      </div>
    </section>

    <section class="grid2">
      <div class="panel">
        <h2>渠道能力分布概览</h2>
        <div id="channelScatterChart" class="chart"></div>
      </div>
      <div class="panel">
        <h2>Top 5 专员</h2>
        <table id="topTable">
          <thead>
            <tr><th>专员</th><th>分公司</th><th>渠道</th><th>评分合计</th><th>能力评级</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="./data.inline.js"></script>
  <script src="./app.js"></script>
</body>
</html>
